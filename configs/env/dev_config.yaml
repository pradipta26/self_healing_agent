config_version: 1.0.0

env_variables:
  SHA_ENV: DEV
  EMAILS: pradipta26@gmail.com
  AUTONOMY_MODE: SHADOW
  KILL_SWITCH_STATE: DISABLED
  # Postgres DB connection:
  DB_HOST: 127.0.0.1
  DB_PORT: 5432
  DB_USER: postgres
  DB_PASSWORD: Suvra#10
  DB_NAME: postgres

  # GOOGLE_API_KEY is directly set in system env variable
  LLM_MODEL: gemini-2.5-flash
  USE_VERTEX_AI: False
validation_schema:
  schema_version: 1.0.0
  description: Validation contract for parsed structured_input payloads.

  common_fields:
    required:
      - incident_type
      - env
      - service_domain
      - datacenter
      - metric_names
      - app_name
      - reason
    properties:
      incident_type:
        type: string
        enum: [Host Infrastructure, Service Instance, System Instance, Service DC, System DC]
      env:
        type: string
        enum: [DEV, STAGING, CANARY, PROD]
      service_domain:
        type: string
      datacenter:
        type: string
        enum: [AWSE, AWSW, AZUREE, AZUREW, GCE, GCW, BDC, ADC, CDC]
      metric_names:
        type: array[string]
      app_name:
        type: string
      reason:
        type: string

  by_incident_type:
    Host Infrastructure:
      required: [hosts, instances]
      properties:
        hosts:
          type: array[string]
        instances:
          type: array[string]
        instance_hosts:
          type: array[string]

    Service Instance:
      required: [instances]
      properties:
        hosts:
          type: array[string]
        instances:
          type: array[string]
        instance_hosts:
          type: array[string]

    System Instance:
      required: [hosts]
      properties:
        hosts:
          type: array[string]
        instances:
          type: array[string]
        instance_hosts:
          type: array[string]

    Service DC:
      required: []
      properties:
        hosts:
          type: array[string]
        instances:
          type: array[string]
        instance_hosts:
          type: array[string]

    System DC:
      required: []
      properties:
        hosts:
          type: array[string]
        instances:
          type: array[string]
        instance_hosts:
          type: array[string]
